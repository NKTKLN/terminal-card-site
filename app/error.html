<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>NKTKLN — error</title>
  <meta name="description" content="NKTKLN — error page." />
  <meta name="theme-color" content="#0b0f14" />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>

<body>
  <div class="wrap">
    <div class="terminal scan" role="region" aria-label="error page">
      <div class="topbar">
        <div class="dots" aria-hidden="true">
          <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
        </div>
        <div class="hint">Something went wrong</div>
      </div>

      <div class="screen" role="application" aria-label="terminal">
        <div class="scroll out" aria-live="polite" aria-relevant="additions">
          <div class="line">
            <pre><span class="prompt">nktkln@system:~$</span> <span class="cmd">status</span></pre>
          </div>

          <div class="line">
            <pre>
<span class="pink">error:</span> <span id="code">???</span> <span id="msg" class="muted">error</span>
<span class="muted">hint:</span> check the URL or go back home
            </pre>
          </div>

          <div class="line">
            <pre><span class="prompt">nktkln@system:~$</span> <span class="cmd">open /</span></pre>
          </div>

          <div class="line">
            <pre><a href="/" rel="nofollow">↩ go to homepage</a></pre>
          </div>
        </div>

        <div class="footer">© <span id="year"></span> NKTKLN · made with love 🌸</div>
      </div>
    </div>
  </div>

  <script defer src="/assets/js/error.js"></script>
</body>
</html>
