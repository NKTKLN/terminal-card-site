server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Error pages (pass actual status code)
  error_page 404 = /error.html?code=$status;
  error_page 500 502 503 504 = /error.html?code=$status;

  location = /error.html {
    add_header Cache-Control "no-cache";
    internal;
  }

  # Make sure error script isn't cached either
  location = /assets/js/error.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Static assets: cache 1 day
  location /assets/ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # Everything else: serve index.html (SPA)
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
